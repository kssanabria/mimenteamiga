<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Mente Amiga - Registro paciente</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="cloud cloud-left"></div>
        <div class="cloud cloud-right"></div>
        <div class="cloud cloud-left2"></div>
        <div class="cloud cloud-right2"></div>
    </header>

    <img src="/logo (1).png" alt="logo de mi mente amiga">

    <h1>MI MENTE AMIGA</h1>
    <h2>TU APOYO DIARIO</h2>
    <div class="titulo-paciente">
      <i class="fa-solid fa-heart"></i>
      <p class="titulo-paciente-parrafo">
        Paciente
    </p>
    </div>
    
    
    <form>
      <div class="campo-formulario">
        <i class="fa-solid fa-envelope"></i> 
        <input type="email" placeholder="Correo electrónico">
      </div>
      <br>
      <div class="campo-formulario">
        <i class="fa-solid fa-lock"></i> 
        <input type="password" placeholder="Contraseña">
      </div>
      <br>
        <button class="boton-enviar">Iniciar sesión</button>
    </form>
    <br>
    <div class="p-final">
      <p>
        ¿No tienes cuenta? Comunícate con tu cuidador para que te registre en la aplicación. 
        <i class="fa-solid fa-heart"></i> 
    </div>

    <div class="svg-onda" style="height: 300px; width: 100%; overflow: hidden; margin-bottom: -1rem">
      <svg
          viewBox="0 0 500 150"
          preserveAspectRatio="none"
          style="height: 100%; width: 100%"
        >
        <path
            d="M-22.29,98.20 C149.99,150.00 348.47,-0.47 507.62,121.88 L500.00,150.00 L0.00,150.00 Z"
            style="stroke: none; fill: #BFEA9C"
        ></path>
      </svg>
    </div>
</body>
</html>
