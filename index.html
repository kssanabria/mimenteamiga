<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Mente Amiga - Registro</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="cloud cloud-left"></div>
        <div class="cloud cloud-right"></div>
    </header>

    <img src="logo.png" alt="logo de mi mente amiga">

    <h1>Registro del cuidador</h1>
    <p>
        <i class="fa-solid fa-hand"></i>
        Cuidador
    </p>
    

    <form>
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Nombre completo">

        <br><br>

        <i class="fa-solid fa-phone"></i>
        <input type="phone" placeholder="Teléfono">

        <br><br>

        <label> <i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email">

        <br><br>

        <label> <i class="fa-solid fa-lock"></i> Contraseña</label>
        <input type="password" ><i class="fa-solid fa-eye"></i>

        <br><br>

        <label> <i class="fa-solid fa-lock"></i> Confirmar contraseña</label>
        <input type="password"><i class="fa-solid fa-eye"></i>

        <br><br>

        <button>Crear cuenta</button>
    </form>
    <p>
        ¿Ya tiene cuenta?
        Inicia sesión
    </p>
    <div class="svg-onda" style="height: 500px; overflow: hidden; margin-bottom: -0.5rem">
        <svg
          viewBox="0 0 500 150"
          preserveAspectRatio="none"
          style="height: 100%; width: 100%"
        >
          <path
            d="M-22.29,98.20 C149.99,150.00 348.47,-0.47 507.62,121.88 L500.00,150.00 L0.00,150.00 Z"
            style="stroke: none; fill: #BFEA9C"
          ></path>
        </svg>
      </div>
</body>
</html>
