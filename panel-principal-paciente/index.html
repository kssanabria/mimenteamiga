<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Mente Amiga - Registro paciente</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="cloud cloud-left"></div>
        <div class="cloud cloud-right"></div>
        <div class="cloud cloud-left2"></div>
        <div class="cloud cloud-right2"></div>
    </header>

    <img src="/logo (1).png" alt="logo de mi mente amiga">

    <h1>Mi Mente Amiga</h1>
    <h2>Tu apoyo diario </h2>
    <section>
        <h3>
            Hola Paciente, ¿cómo te sientes hoy?
        </h3>
        <p class="d-inline-flex gap-1">
            <a class="btn btn-primary" data-bs-toggle="collapse" href="#collapseExample" role="button" aria-expanded="false" aria-controls="collapseExample">
                Videos informativos
            </a>
        </p>
        <button 
  class="btn btn-primary" 
  data-bs-toggle="collapse" 
  data-bs-target="#collapseExample">
  Ver videos
</button>
        <div class="collapse" id="collapseExample">
            <video width="400" controls>
                <source src="/video1-paciente.mp4" type="video/mp4">
                Tu navegador no soporta video.
            </video>
            <video width="400" controls>
                <source src="/video2-paciente.mp4" type="video/mp4">
                Tu navegador no soporta video.
            </video>
        </div>
        <article>
            <i class="fa-solid fa-face-grin"></i>
            <p>
                Registrar emoción
            </p>
        </article>
        <article>
            <i class="fa-solid fa-pills"></i>
            <p>
                Mi medicación
            </p>
        </article>
        <article>
            <i class="fa-solid fa-arrow-up-right-dots"></i>
            <p>
                Mi progreso
            </p>
        </article>
        <article>
            <i class="fa-solid fa-people-group"></i>
            <p>
                Familia
            </p>
        </article>
        <div>
            <p>
                Todo va a estar bien
            </p>
            <p>
                Hoy has hecho un gran refuerzo
            </p>
        </div>
    </section>
    <footer>
        <div class="section-footer">
            <i class="fa-regular fa-house"></i>
            <p>
                Inicio
            </p>
        </div>
        <div class="section-footer">
            <i class="fa-regular fa-face-grin"></i>
            <p>
                Emoción
            </p>
        </div>
        <div class="section-footer">
            <i class="fa-regular fa-pills"></i>
            <p>
                Medicación
            </p>
        </div>
        <div class="section-footer">
            <i class="fa-regular fa-arrow-up-right-dots"></i>
            <p>
                Progreso
            </p>
        </div>
        <div class="section-footer">
            <i class="fa-regular fa-people-group"></i>
            <p>
                Familia
            </p>
        </div>
        
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
