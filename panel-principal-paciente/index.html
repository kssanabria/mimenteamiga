<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Mente Amiga - Registro paciente</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="cloud cloud-left"></div>
        <div class="cloud cloud-right"></div>
        <div class="cloud cloud-left2"></div>
        <div class="cloud cloud-right2"></div>
    </header>

    <img src="/logo (1).png" alt="logo de mi mente amiga">

    <h1>Mi Mente Amiga</h1>
    <h2>Tu apoyo diario </h2>
    <section>
        <h3>
            Hola Paciente, ¿cómo te sientes hoy?
        </h3>
        <div class="contenedorVideos">
            <button id="toggleBtn">Ver videos informativos</button>

            <div id="contenedorVideos" class="oculto">
                <video width="400" controls>
                    <source src="/video1-paciente.mp4" type="video/mp4">
                </video>

                <video width="400" controls>
                    <source src="/video2-paciente.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <article>
            <i class="fa-solid fa-face-grin"></i>
            <p>
                Registrar emoción
            </p>
        </article>
        <article>
            <i class="fa-solid fa-pills"></i>
            <p>
                Mi medicación
            </p>
        </article>
        <article>
            <i class="fa-solid fa-arrow-up-right-dots"></i>
            <p>
                Mi progreso
            </p>
        </article>
        <article>
            <i class="fa-solid fa-people-group"></i>
            <p>
                Familia
            </p>
        </article>
        <div>
            <p>
                Todo va a estar bien
            </p>
            <p>
                Hoy has hecho un gran refuerzo
            </p>
        </div>
    </section>
    <footer>
        <div class="section-footer">
            <i class="fa-regular fa-house"></i>
            <p>
                Inicio
            </p>
        </div>
        <div class="section-footer">
            <i class="fa-regular fa-face-grin"></i>
            <p>
                Emoción
            </p>
        </div>
        <div class="section-footer">
            <i class="fa-regular fa-pills"></i>
            <p>
                Medicación
            </p>
        </div>
        <div class="section-footer">
            <i class="fa-regular fa-arrow-up-right-dots"></i>
            <p>
                Progreso
            </p>
        </div>
        <div class="section-footer">
            <i class="fa-regular fa-people-group"></i>
            <p>
                Familia
            </p>
        </div>
        
    </footer>
    <script src="script.js"></script>
</body>
